<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 720" width="600" height="720" role="img" aria-label="Placeholder portrait">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3d5afe"/>
      <stop offset="1" stop-color="#ff5c39"/>
    </linearGradient>
  </defs>
  <rect width="600" height="720" fill="#141318"/>
  <!-- gradient disc -->
  <circle cx="300" cy="300" r="180" fill="url(#bg)" opacity="0.9"/>
  <!-- simple figure silhouette -->
  <g fill="#141318">
    <circle cx="300" cy="270" r="70"/>
    <path d="M180 470c0-70 54-120 120-120s120 50 120 120v40H180z"/>
  </g>
  <!-- grid overlay -->
  <g stroke="#f4f1ea" stroke-opacity="0.08">
    <line x1="0" y1="180" x2="600" y2="180"/>
    <line x1="0" y1="360" x2="600" y2="360"/>
    <line x1="0" y1="540" x2="600" y2="540"/>
    <line x1="150" y1="0" x2="150" y2="720"/>
    <line x1="300" y1="0" x2="300" y2="720"/>
    <line x1="450" y1="0" x2="450" y2="720"/>
  </g>
  <text x="300" y="650" fill="#a5a1b0" font-family="monospace" font-size="20" text-anchor="middle" letter-spacing="3">
    your photo here
  </text>
</svg>
